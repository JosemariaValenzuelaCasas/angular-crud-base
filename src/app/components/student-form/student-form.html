<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
    <h2 class="text-xl font-bold mb-4 text-gray-800">
      {{ student() ? 'Editar Registro' : 'Nuevo Registro' }}
    </h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
        <input type="text" formControlName="name" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">DNI</label>
        <input type="text" formControlName="dni" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Apellidos</label>
        <input type="text" formControlName="lastName" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Promocion</label>
        <input type="text" formControlName="promotion" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!--<div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
        <textarea formControlName="description" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>-->

      <div class="flex justify-end gap-2">
        <button type="button" (click)="close.emit()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded hover:bg-gray-300 transition">
          Cancelar
        </button>
        <button type="submit" [disabled]="form.invalid" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50 transition">
          Guardar
        </button>
      </div>
    </form>
  </div>
</div>
